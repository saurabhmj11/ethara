services:
  - type: web
    name: ethara-backend
    runtime: python
    rootDir: ethara/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethara-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: ethara-db
    plan: free
    ipAllowList: []
